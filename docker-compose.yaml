# =============================================================================
# Ars - Docker Compose
#
# 統合Webサーバー（Editor + Resource Depot + Data Organizer）を起動します。
#
# 使用方法:
#   docker compose up -d        # サービス起動
#   docker compose logs -f      # ログ確認
#   docker compose down         # サービス停止
#
# ローカルビルド:
#   docker compose up -d --build
#
# 環境変数:
#   IMAGE_TAG (default: latest) - 使用するイメージのタグ
# =============================================================================

services:
  ars:
    image: ghcr.io/ludiars/ars:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: ars-editor/Dockerfile
    container_name: ars
    ports:
      - "${ARS_PORT:-5173}:5173"
    environment:
      - PORT=5173
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_REDIRECT_URI=${GITHUB_REDIRECT_URI:-http://localhost:5173/auth/github/callback}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-ap-northeast-1}
    restart: unless-stopped
