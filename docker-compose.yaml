# =============================================================================
# Ars - Docker Compose
#
# 統合Webサーバー（Editor + Collaboration）を起動します。
# 認証・ユーザー管理・プロジェクト管理は Cernere サーバーに委譲。
#
# 使用方法:
#   docker compose up -d        # サービス起動
#   docker compose logs -f      # ログ確認
#   docker compose down         # サービス停止
#
# ローカルビルド:
#   docker compose up -d --build
#
# 環境変数:
#   IMAGE_TAG (default: latest) - 使用するイメージのタグ
#   DOCKER_PLATFORM (default: linux/arm64) - ターゲットプラットフォーム
#   CERNERE_URL - Cernere サーバーの URL (default: http://cernere:8080)
# =============================================================================

services:
  ars:
    image: ghcr.io/ludiars/ars:${IMAGE_TAG:-latest}
    build:
      context: .
      platforms:
        - ${DOCKER_PLATFORM:-linux/arm64}
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    container_name: ars
    ports:
      - "${ARS_PORT:-5173}:5173"
    volumes:
      - ars-data:/app/data
    environment:
      CERNERE_URL: ${CERNERE_URL:-http://cernere:8080}
    restart: unless-stopped

volumes:
  ars-data:
