id = "lockon"
name_ja = "ロックオン"
name_en = "Target Lock-on"
summary = "近接戦で対象敵にカメラ / 入力を吸着させる"
tags = ["combat", "camera"]
genres = ["action"]
depends_on = ["camera-follow"]
conflicts_with = []

[[parameter]]
id = "max_range"
type = "float"
default = 12.0
range = [1.0, 200.0]
description_ja = "ロックオン可能な最大距離 (m)"

[[parameter]]
id = "auto_switch"
type = "bool"
default = true
description_ja = "対象死亡時に近隣敵へ自動切替"
