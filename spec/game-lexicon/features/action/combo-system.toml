id = "combo-system"
name_ja = "コンボシステム"
name_en = "Combo System"
summary = "連続入力で技をつなげる仕組み"
tags = ["combat", "input"]
genres = ["action", "fighting"]
depends_on = ["input-buffer", "hitbox-system"]
conflicts_with = []

[[parameter]]
id = "max_combo"
type = "int"
default = 8
range = [1, 99]
description_ja = "最大コンボ段数"

[[parameter]]
id = "cancel_window_ms"
type = "int"
default = 200
range = [16, 1000]
description_ja = "次入力を受け付ける時間 (ms)"
