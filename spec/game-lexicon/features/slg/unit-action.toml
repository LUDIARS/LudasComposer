id = "unit-action"
name_ja = "ユニット行動"
name_en = "Unit Action"
summary = "ターン内に各ユニットが移動 / 攻撃 / スキル / 待機を選ぶ"
tags = ["combat", "turn-based"]
genres = ["slg"]
depends_on = ["hex-grid", "stat-system"]
conflicts_with = []

[[parameter]]
id = "actions_per_turn"
type = "int"
