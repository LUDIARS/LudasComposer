name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect which paths changed
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'ars-editor/**'
              - '!ars-editor/src-tauri/**'
            rust:
              - 'ars-editor/src-tauri/**'
              - 'crates/**'

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ars-editor/package-lock.json
      - name: Install dependencies
        working-directory: ars-editor
        run: npm ci
      - name: Lint
        working-directory: ars-editor
        run: npm run lint
      - name: TypeScript check
        working-directory: ars-editor
        run: npx tsc -b

  rust:
    name: Rust
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ars-editor/src-tauri -> target
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang libclang-dev cmake
      - name: Clippy
        working-directory: ars-editor/src-tauri
        run: cargo clippy --features web-server --no-default-features --bin ars-web-server -- -D warnings
