name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect which paths changed
  changes:
    name: Detect changes
    runs-on: self-hosted
    timeout-minutes: 2
    defaults:
      run:
        shell: powershell
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'ars-editor/**'
              - '!ars-editor/src-tauri/**'
            rust:
              - 'ars-editor/src-tauri/**'
              - 'crates/**'

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: self-hosted
    timeout-minutes: 10
    defaults:
      run:
        shell: powershell

    steps:
      - uses: actions/checkout@v4

      # Linux コンテナ内で Node.js ビルド・リント実行
      # → Windows self-hosted runner のパス問題を回避
      - name: Lint & TypeScript check (inside Linux container)
        run: |
          docker run --rm `
            -v "${PWD}:/workspace" `
            -w /workspace/ars-editor `
            node:20-slim sh -c "npm ci && npm run lint && npx tsc -b"

  rust:
    name: Rust
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: self-hosted
    timeout-minutes: 30
    defaults:
      run:
        shell: powershell

    steps:
      - uses: actions/checkout@v4

      # Linux コンテナ内で Clippy 実行
      # → Windows self-hosted runner のパス問題を回避
      - name: Clippy (inside Linux container)
        run: |
          docker run --rm `
            -v "${PWD}:/workspace" `
            -w /workspace/ars-editor/src-tauri `
            rust:1-bookworm sh -c "rustup component add clippy && apt-get update && apt-get install -y --no-install-recommends clang libclang-dev cmake > /dev/null 2>&1 && cargo clippy --features web-server --no-default-features --bin ars-web-server -- -D warnings"
