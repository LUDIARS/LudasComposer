name: Update Web Version

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      custom_version:
        description: 'Custom version (overrides bump_type, e.g. 1.2.3)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  update-version:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ars-editor

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'

      - name: Calculate new version
        id: version
        env:
          CUSTOM_VERSION: ${{ inputs.custom_version }}
          BUMP_TYPE: ${{ inputs.bump_type }}
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          if [ -n "$CUSTOM_VERSION" ]; then
            NEW_VERSION="$CUSTOM_VERSION"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
            case "$BUMP_TYPE" in
              major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
              minor) NEW_VERSION="$MAJOR.$((MINOR + 1)).0" ;;
              patch) NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
            esac
          fi

          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping version: $CURRENT_VERSION -> $NEW_VERSION"

      - name: Update package.json version
        env:
          NEW_VERSION: ${{ steps.version.outputs.new }}
        run: |
          npm version "$NEW_VERSION" --no-git-tag-version

      - name: Update Cargo.toml version
        env:
          NEW_VERSION: ${{ steps.version.outputs.new }}
        run: |
          sed -i "0,/^version = /s/^version = \".*\"/version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml

      - name: Update tauri.conf.json version
        env:
          NEW_VERSION: ${{ steps.version.outputs.new }}
        run: |
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = process.env.NEW_VERSION;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ steps.version.outputs.new }}
          path: ars-editor/dist/

      - name: Commit version update
        env:
          NEW_VERSION: ${{ steps.version.outputs.new }}
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ars-editor/package.json ars-editor/src-tauri/Cargo.toml ars-editor/src-tauri/tauri.conf.json
          git commit -m "chore: bump web version to v$NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin HEAD --tags
