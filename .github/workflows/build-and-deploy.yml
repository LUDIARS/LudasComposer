name: Build on Dedicated Instance

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.2.0). Leave empty for untagged build.'
        required: false
        type: string
      deploy:
        description: 'Auto-deploy to production after build'
        required: false
        type: boolean
        default: false
      instance_type:
        description: 'Build instance type (override vars.BUILD_INSTANCE_ID to use a different instance)'
        required: false
        type: choice
        options:
          - '(default from variable)'
          - c7g.large
          - c7g.xlarge
          - c7g.2xlarge

# 同時実行を防止 (ビルドインスタンスは1台のため)
concurrency:
  group: build-instance
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-1' }}
  BUILD_INSTANCE_ID: ${{ vars.BUILD_INSTANCE_ID }}
  S3_BUCKET: ${{ vars.S3_BUCKET || 'ars-build-artifacts' }}
  # インスタンスタイプ変更は EC2 コンソールまたは AWS CLI で事前に行う必要があります。
  # workflow_dispatch の instance_type 入力は、起動前にインスタンスタイプを変更します。
  BUILD_INSTANCE_TYPE: ${{ inputs.instance_type }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      build_label: ${{ steps.build.outputs.build_label }}

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_BUILD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Change instance type (if specified)
        if: inputs.instance_type && inputs.instance_type != '(default from variable)'
        run: |
          DESIRED_TYPE="${{ inputs.instance_type }}"
          echo "Changing instance type to: $DESIRED_TYPE"

          # 停止中であることを確認
          STATE=$(aws ec2 describe-instances \
            --instance-ids "$BUILD_INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text)

          if [ "$STATE" != "stopped" ]; then
            echo "::error::Instance must be stopped to change type (current: $STATE)"
            exit 1
          fi

          CURRENT_TYPE=$(aws ec2 describe-instances \
            --instance-ids "$BUILD_INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].InstanceType' \
            --output text)

          if [ "$CURRENT_TYPE" = "$DESIRED_TYPE" ]; then
            echo "Instance is already $DESIRED_TYPE, no change needed"
          else
            aws ec2 modify-instance-attribute \
              --instance-id "$BUILD_INSTANCE_ID" \
              --instance-type "{\"Value\": \"$DESIRED_TYPE\"}"
            echo "Changed: $CURRENT_TYPE -> $DESIRED_TYPE"
          fi

      - name: Start build instance
        id: start
        run: |
          echo "Starting EC2 instance: $BUILD_INSTANCE_ID"

          # 現在の状態を確認
          STATE=$(aws ec2 describe-instances \
            --instance-ids "$BUILD_INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text)

          echo "Current state: $STATE"

          if [ "$STATE" = "running" ]; then
            echo "Instance is already running"
          elif [ "$STATE" = "stopped" ]; then
            aws ec2 start-instances --instance-ids "$BUILD_INSTANCE_ID"
            echo "Waiting for instance to be running..."
            aws ec2 wait instance-running --instance-ids "$BUILD_INSTANCE_ID"
          else
            echo "::error::Instance is in unexpected state: $STATE"
            exit 1
          fi

          # SSM が使えるまで待機
          echo "Waiting for SSM agent..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$BUILD_INSTANCE_ID" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || echo "None")
            if [ "$STATUS" = "Online" ]; then
              echo "SSM agent is online"
              break
            fi
            echo "  Attempt $i/30: SSM status=$STATUS"
            sleep 10
          done

          if [ "$STATUS" != "Online" ]; then
            echo "::error::SSM agent did not come online"
            exit 1
          fi

      - name: Run build on instance
        id: build
        run: |
          VERSION_ARG=""
          if [ -n "${{ inputs.version }}" ]; then
            VERSION_ARG="--version ${{ inputs.version }}"
          fi

          # SSM でビルドスクリプトを実行
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$BUILD_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'export HOME=/home/ubuntu',
              'export NVM_DIR=/home/ubuntu/.nvm',
              '. /home/ubuntu/.nvm/nvm.sh',
              '. /home/ubuntu/.cargo/env',
              'cd /home/ubuntu/Ars',
              'bash infra/build-instance/build.sh $VERSION_ARG'
            ]" \
            --timeout-seconds 1200 \
            --cloud-watch-output-config '{"CloudWatchOutputEnabled":true}' \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # コマンド完了を待機
          echo "Waiting for build to complete..."
          while true; do
            RESULT=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$BUILD_INSTANCE_ID" \
              --query '[Status, StatusDetails]' \
              --output text 2>/dev/null || echo "InProgress Waiting")

            STATUS=$(echo "$RESULT" | awk '{print $1}')
            DETAIL=$(echo "$RESULT" | awk '{print $2}')

            echo "  Status: $STATUS ($DETAIL)"

            case "$STATUS" in
              Success)
                echo "Build succeeded!"
                break
                ;;
              Failed|TimedOut|Cancelled)
                echo "::error::Build failed with status: $STATUS"

                # エラー出力を取得
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$BUILD_INSTANCE_ID" \
                  --query 'StandardErrorContent' \
                  --output text || true

                exit 1
                ;;
              *)
                sleep 15
                ;;
            esac
          done

          # ビルド出力を表示
          echo "=== Build Output ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$BUILD_INSTANCE_ID" \
            --query 'StandardOutputContent' \
            --output text

      - name: Stop build instance
        if: always()
        run: |
          echo "Stopping EC2 instance: $BUILD_INSTANCE_ID"
          aws ec2 stop-instances --instance-ids "$BUILD_INSTANCE_ID" || true
          echo "Stop command sent"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: inputs.deploy == true
    environment: production
    timeout-minutes: 10
    permissions:
      id-token: write    # OIDC for AWS credentials
      contents: none     # deploy ジョブはリポジトリ読み取り不要

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to production
        run: |
          PROD_INSTANCE_ID="${{ vars.PROD_INSTANCE_ID }}"

          VERSION_ARG=""
          if [ -n "${{ inputs.version }}" ]; then
            VERSION_ARG="--version ${{ inputs.version }}"
          fi

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$PROD_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'bash /opt/ars-editor/deploy.sh $VERSION_ARG'
            ]" \
            --timeout-seconds 300 \
            --query 'Command.CommandId' \
            --output text)

          echo "Deploy Command ID: $COMMAND_ID"

          # 完了待ち
          while true; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$PROD_INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || echo "InProgress")

            echo "  Status: $STATUS"

            case "$STATUS" in
              Success)
                echo "Deploy succeeded!"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$PROD_INSTANCE_ID" \
                  --query 'StandardOutputContent' \
                  --output text
                break
                ;;
              Failed|TimedOut|Cancelled)
                echo "::error::Deploy failed"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$PROD_INSTANCE_ID" \
                  --query 'StandardErrorContent' \
                  --output text || true
                exit 1
                ;;
              *)
                sleep 5
                ;;
            esac
          done
